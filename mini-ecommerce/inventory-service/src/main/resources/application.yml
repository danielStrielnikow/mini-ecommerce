server:
  port: 8083

spring:
  application:
    name: inventory-service

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration/inventory

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: >
          order-created:com.example.events.OrderCreatedEvent,
          order-cancelled:com.example.events.OrderCancelledEvent,
          order-expired:com.example.events.OrderExpiredEvent,
          product-created:com.example.events.ProductCreatedEvent,
          product-deleted:com.example.events.ProductDeletedEvent,
          stock-depleted:com.example.events.StockDepletedEvent,
          stock-restored:com.example.events.StockRestoredEvent
    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.events"
        spring.json.type.mapping: >
          order-created:com.example.events.OrderCreatedEvent,
          order-cancelled:com.example.events.OrderCancelledEvent,
          order-expired:com.example.events.OrderExpiredEvent,
          product-created:com.example.events.ProductCreatedEvent,
          product-deleted:com.example.events.ProductDeletedEvent,
          stock-depleted:com.example.events.StockDepletedEvent,
          stock-restored:com.example.events.StockRestoredEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
